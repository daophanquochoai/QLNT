<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motel Management</title>
</head>
<link rel="stylesheet" type="text/css" href="/css/admin/base.css">
<link rel="stylesheet" type="text/css" href="/css/admin/room.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous" referrerpolicy="no-referrer"/>
<body>
<div class="room-page">
    <div th:replace="~{fragments/adminFragment :: sidebar}" class="sidebar"></div>
    <div class="main-content">
        <header th:replace="~{fragments/adminFragment :: header}"></header>
        <div class="wrapper">
            <!--Code ở đây-->
            <div class="room-tool table-frame">
                <div class="filter-section">
                    <form action role="search">
                        <label for="filter-list">Room Status:</label>
                        <select id="filter-list" name="roomStatus">
                            <option value="0">Empty</option>
                            <option value="1">Occupied</option>
                        </select>
                    </form>
                </div>
                <div class="search-section">
                    <form action role="search">
                        <label for="search-field">Search for Room ID:</label>
                        <input type="search" name="roomId" id="search-field" placeholder="Room ID">
                    </form>
                </div>
            </div>
            <div class="room-list table-frame">
                <div class="room-card">
                    <div class="room-id"></div>
                    <div class="room-owner"></div>
                    <div class="room-price"></div>
                    <div class="room-option"></div>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
<script th:replace="~{fragments/adminFragment :: script}"></script>
</html>
